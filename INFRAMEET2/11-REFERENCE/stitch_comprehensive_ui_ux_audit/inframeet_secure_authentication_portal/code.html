<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>INFRAMEET - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

                      "primary-fixed-dim": "#c0c1ff",
                      "surface-bright": "#363a3b",
                      "inverse-primary": "#494bd6",
                      "on-secondary": "#283044",
                      "background": "#101415",
                      "primary-fixed": "#e1e0ff",
                      "on-surface": "#e0e3e5",
                      "outline-variant": "#464554",
                      "tertiary": "#4edea3",
                      "surface": "#101415",
                      "on-surface-variant": "#c7c4d7",
                      "on-primary-container": "#0d0096",
                      "tertiary-fixed-dim": "#4edea3",

              "borderRadius": {

              "spacing": {
                      "container-max": "1440px",
                      "margin-mobile": "16px",
                      "margin-desktop": "40px",
                      "unit": "8px",
                      "gutter": "24px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Plus Jakarta Sans"],

<style>
        .glass-panel {
            background: linear-gradient(135deg, rgba(39, 42, 44, 0.4) 0%, rgba(29, 32, 34, 0.7) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(192, 193, 255, 0.05);
        }
        
        .bg-tech-grid {
            background-image: 
                linear-gradient(to right, rgba(144, 143, 160, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(144, 143, 160, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .glow-input:focus-within {
            box-shadow: 0 0 0 1px rgba(192, 193, 255, 0.5), 0 0 15px rgba(192, 193, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Atmospheric Background -->
<div class="absolute inset-0 z-0 bg-tech-grid pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<!-- Main Authentication Container -->
<main class="w-full max-w-md px-margin-mobile md:px-0 relative z-10 flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-8 text-center flex flex-col items-center">
<div class="w-12 h-12 rounded-lg bg-surface-container-high border border-white/10 flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(192,193,255,0.1)]">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg tracking-tighter text-on-surface mb-2">INFRAMEET</h1>
<p class="font-technical-data text-technical-data text-on-surface-variant uppercase tracking-widest">Secure Access Node</p>
</div>
<!-- Glassmorphic Auth Card -->
<div class="glass-panel w-full rounded-xl p-8 relative overflow-hidden">
<!-- Decorative inner glow top border -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<!-- Tab Toggle -->
<div class="flex p-1 bg-surface-dim rounded-lg mb-8 border border-white/5">
<button class="flex-1 py-2 font-technical-data text-technical-data text-on-primary bg-primary rounded bg-opacity-100 transition-all text-center">Login</button>
<button class="flex-1 py-2 font-technical-data text-technical-data text-on-surface-variant hover:text-on-surface rounded transition-all text-center">Request Access</button>
</div>
<!-- Form -->
<form class="space-y-5">
<!-- ID Input -->
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block">System ID / Email</label>
<div class="relative glow-input transition-shadow rounded-lg">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[18px]">badge</span>
<input autocomplete="username" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-technical-data text-technical-data text-on-surface focus:border-primary focus:outline-none transition-colors placeholder:text-outline/50" placeholder="admin@inframeet.net" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block">Cryptographic Key</label>
<a class="font-technical-data text-technical-data text-primary hover:text-primary-fixed transition-colors text-[12px]" href="#">Reset Key?</a>
</div>
<div class="relative glow-input transition-shadow rounded-lg">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[18px]">key</span>
<input autocomplete="current-password" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-10 font-technical-data text-technical-data text-on-surface focus:border-primary focus:outline-none transition-colors placeholder:text-outline/50" placeholder="••••••••••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
</div>
<!-- Security Status Indicator (Decorative) -->
<div class="flex items-center gap-2 py-2 px-3 bg-surface-dim border border-tertiary/20 rounded-lg">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
<span class="font-technical-data text-technical-data text-[12px] text-tertiary uppercase tracking-wider">Connection Secure (TLS 1.3)</span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-fixed text-on-primary font-technical-data text-technical-data py-3 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2" type="button">
<span class="material-symbols-outlined text-[18px]">login</span>
                    Authenticate Session
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-label-caps text-outline">Alternative Protocols</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Alternative Auth Options -->
<div class="space-y-3">
<button class="w-full bg-surface-container hover:bg-surface-container-highest border border-white/5 text-on-surface font-technical-data text-technical-data py-3 rounded-lg transition-colors flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-primary">corporate_fare</span>
                    Enterprise SSO
                </button>
<button class="w-full bg-surface-container hover:bg-surface-container-highest border border-white/5 text-on-surface font-technical-data text-technical-data py-3 rounded-lg transition-colors flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-tertiary">school</span>
                    Academic Verification
                </button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex gap-6 font-technical-data text-[12px] text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Privacy Protocol</a>
<a class="hover:text-primary transition-colors" href="#">System Status</a>
</div>
</main>
</body></html>
