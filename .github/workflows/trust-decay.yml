# ============================================================================
# 🛡️ INFRAMEET — AUTOMATED TRUST DECAY ACTIONS WORKFLOW
# ============================================================================
# File Path: .github/workflows/trust-decay.yml
# Schedule: Runs daily at midnight UTC
# Purpose: Authoritative execution of trust stagnation penalties (-5 points)
# ============================================================================

name: INFRAMEET Trust Score Decay Cron

on:
  schedule:
    # Run once daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub Action tab

jobs:
  apply-decay:
    name: Apply Trust Score Stagnation Decay
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package.json'

      - name: Install Project Dependencies
        run: npm install @supabase/supabase-js

      - name: Execute Trust Decay Cron Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/apply-decay.js
